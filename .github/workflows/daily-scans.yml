name: Daily Crypto Scans

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC daily
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Crypto Signals
        env:
          MAIL_APPPASSWORD: ${{ secrets.MAIL_APPPASSWORD }}
        run: python crypto-signals/crypto_signals.py

      - name: Run Alpha Hunter
        env:
          Mail_apppassword: ${{ secrets.MAIL_APPPASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: python crypto-signals/crypto_alpha_hunter.py --top 15 --email

      - name: Commit reports
        run: |
          git config user.name "MoltStreet Bot"
          git config user.email "bot@moltstreet.dev"
          git add -A
          git diff --staged --quiet || git commit -m "auto: daily scan $(date -u +%Y-%m-%d)"
          git push
