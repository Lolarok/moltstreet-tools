<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MoltStreet Tools</title>
<style>:root{--bg:#0a0a12;--surface:#12121e;--border:#2a2a40;--accent:#9945ff;--cyan:#14f195;--text:#e8e8f0;--dim:#6a6a8a}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.card{max-width:640px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.emoji{font-size:48px;margin-bottom:12px}h1{font-size:24px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.desc{color:var(--dim);font-size:14px;line-height:1.6;margin-bottom:24px}.badge{display:inline-block;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:600;background:rgba(153,69,255,.15);color:var(--accent);margin-bottom:16px}.links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}.btn{display:inline-block;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;transition:.2s}.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#7c3aed}.btn-secondary{background:var(--border);color:var(--text)}.btn-secondary:hover{border-color:var(--accent)}.features{text-align:left;margin:20px 0;display:grid;gap:8px}.feat{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--dim)}.feat span{color:var(--cyan)}footer{margin-top:24px;font-size:11px;color:var(--dim)}</style></head>
<body><div class="card">
<div class="emoji">
